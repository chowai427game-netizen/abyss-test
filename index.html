<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>命運深淵：血脈傳承 - 完整分拆版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-container" id="main-game-shell">
    <h2>⚔️ 命運深淵 ⚔️</h2>
    <div class="location-bar" id="location-text">🔮 命運的起點</div>

    <!-- 1. 📂 封面主面板 (TITLE STATE) -->
    <div class="dynamic-panel title-panel-style" id="title-box">
        <h1 style="color: #ffd700; font-size: 26px; margin: 0 0 5px 0;">命運深淵</h1>
        <p style="color: #bbb; font-size: 12px; margin-bottom: 12px;">【QTE 動態肉鴿全新版】</p>
        
        <div class="notice-container">
            <strong style="color: #ffd700;">📢 測試提示：</strong><br>
            • 依家已經成功接入全新嘅 MP 魔力系統同戰鬥 QTE 動態判定！<br>
            • 請輸入名字開啟你嘅全新冒險之旅。
        </div>

        <input type="text" id="player-name-input" class="name-input" placeholder="請輸入你的勇者大名..." maxlength="12">
        <br>
        <button id="start-game-btn" type="button" onclick="handleStartGame()" class="btn-game btn-explore" style="width: 80%;">開啟冒險之旅 🧭</button>
    </div>

    <!-- 2. 📊 勇者個人數據面板 (預設隱藏，進遊戲後顯示) -->
    <div class="status-panel" id="status-panel-box" style="display: none;">
        <div class="status-item"><span>👤 勇者大名:</span> <span id="p-name">--</span></div>
        <div class="status-item"><span>職業:</span> <span style="color: #00ffff; font-weight:bold;">初心者 (Lv.1)</span></div>
        
        <!-- 血條 -->
        <div class="status-item full-row">
            <div class="flex-space"><span>生命值:</span> <span><span id="p-hp">100</span> / 100</span></div>
            <div class="visual-bar-bg"><div id="hp-bar-fill" class="visual-bar-fill hp-color"></div></div>
        </div>
        
        <!-- 藍色 MP 條 -->
        <div class="status-item full-row">
            <div class="flex-space"><span>魔力值 (MP):</span> <span><span id="p-mp">0</span> / 50</span></div>
            <div class="visual-bar-bg"><div id="mp-bar-fill" class="visual-bar-fill mp-color"></div></div>
        </div>
        <div class="status-item"><span>擁有金幣:</span> <span class="gold" id="p-gold">0</span> G</div>
    </div>

    <!-- 3. 📜 右側日誌打印台 (預設隱藏) -->
    <div class="log-panel" id="log-box" style="display: none;"></div>

    <!-- 4. 🕹️ 動作控制面板 (預設隱藏) -->
    <div class="action-panel" id="action-panel" style="display: none;">
        <button id="btn-action1" type="button" onclick="handleAction1()" class="btn-game btn-explore">⚔️ 進入地下城</button>
    </div>

    <!-- 5. 🔮 獨立彈出層：動態 QTE 視窗 (預設隱藏) -->
    <div id="qte-overlay" style="display: none;">
        <div class="qte-box">
            <p id="qte-skill-name">⚡ 技能發動 ⚡</p>
            <button id="qte-tap-btn" onclick="handleQteTap()">🟢 撳我！</button>
            <div class="qte-timer-bg"><div id="qte-timer-fill"></div></div>
        </div>
    </div>
</div>

<script src="game.js"></script>
</body>
</html>
